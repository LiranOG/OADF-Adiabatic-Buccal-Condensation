# =============================================================================
#  OADF :: GitHub Pages
#  - Publishes docs/web as a static GitHub Pages site.
#  - The site root redirects to the English article for reader-friendly access.
# =============================================================================
name: Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static web article
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
