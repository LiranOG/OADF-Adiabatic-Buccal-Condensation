# =============================================================================
#  OADF :: Continuous Integration
#  - Compiles docs/paper/OADF_academic_paper.tex on every push and PR.
#  - Validates docs/web/*.html with stdlib-only structural validator.
#  - Publishes the compiled PDF as a build artifact (retention: 30 days).
# =============================================================================
name: CI

on:
  push:
    branches: [main]
    paths:
      - "docs/paper/**"
      - "docs/web/**"
      - "scripts/**"
      - "Makefile"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

# Principle of least privilege — read-only token by default.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: HTML structural validation (fast, fails early)
  # ---------------------------------------------------------------------------
  validate-html:
    name: Validate HTML artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683          # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065      # v5.6.0
        with:
          python-version: "3.12"

      - name: Run validator
        run: python3 scripts/validate_html.py docs/web

  # ---------------------------------------------------------------------------
  # Job 2: LaTeX paper compilation
  # ---------------------------------------------------------------------------
  build-paper:
    name: Build LaTeX paper
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [validate-html]
    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683          # v4.2.2
        with:
          persist-credentials: false

      - name: Compile with latexmk
        uses: xu-cheng/latex-action@eb4580a727b04bd86a67e9c3d2f6fe7ee64e6da8  # v3.2.0
        with:
          root_file: OADF_academic_paper.tex
          working_directory: docs/paper
          texlive_version: 2024
          os: alpine
          latexmk_use_xelatex: false
          latexmk_shell_escape: false
          continue_on_error: false
          # Compile with full bibliography + cross-reference resolution.
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error -output-directory=.

      - name: Verify PDF exists and is non-empty
        run: |
          set -euo pipefail
          PDF="docs/paper/OADF_academic_paper.pdf"
          test -f "$PDF" || { echo "::error::PDF not produced"; exit 1; }
          size=$(stat -c%s "$PDF")
          if [ "$size" -lt 10000 ]; then
            echo "::error::PDF suspiciously small (${size} bytes)"; exit 1
          fi
          echo "PDF OK: ${size} bytes"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4.6.2
        with:
          name: OADF_academic_paper-${{ github.sha }}
          path: docs/paper/OADF_academic_paper.pdf
          retention-days: 30
          if-no-files-found: error
